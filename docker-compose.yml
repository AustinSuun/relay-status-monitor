services:
  relay-status-postgres:
    image: postgres:16-alpine
    container_name: relay-status-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: relay_status
      POSTGRES_USER: relay_status
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - relay_status_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay_status -d relay_status"]
      interval: 10s
      timeout: 5s
      retries: 10

  relay-status-monitor:
    build: .
    container_name: relay-status-monitor
    restart: unless-stopped
    depends_on:
      relay-status-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://relay_status:${POSTGRES_PASSWORD}@relay-status-postgres:5432/relay_status?schema=public
      PORT: 3000
      HOSTNAME: 0.0.0.0
    volumes:
      - .:/app
      - relay_status_node_modules:/app/node_modules
      - relay_status_next:/app/.next
    ports:
      - "127.0.0.1:3200:3000"
    command: >
      sh -c "until pg_isready -h relay-status-postgres -p 5432 -U relay_status; do sleep 2; done;
      corepack enable && corepack prepare pnpm@9 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm db:generate &&
      pnpm build &&
      pnpm db:push &&
      pnpm db:seed &&
      pnpm start -p 3000"

volumes:
  relay_status_pgdata:
  relay_status_node_modules:
  relay_status_next:
